<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#1C1C1C"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="monospace" font-size="14" fill="#F2F2F2" text-anchor="middle">
    Protocol Flow Model
  </text>
  
  <!-- Box 1: Human Intent -->
  <rect x="200" y="60" width="200" height="40" fill="none" stroke="#F2F2F2" stroke-width="1.5"/>
  <text x="300" y="85" font-family="monospace" font-size="12" fill="#F2F2F2" text-anchor="middle">
    Human Intent
  </text>
  
  <!-- Arrow 1 -->
  <line x1="300" y1="100" x2="300" y2="120" stroke="#F2F2F2" stroke-width="1.5"/>
  <polygon points="300,120 295,115 305,115" fill="#F2F2F2"/>
  
  <!-- Box 2: Rigor Specification -->
  <rect x="180" y="120" width="240" height="40" fill="none" stroke="#1E3A8A" stroke-width="2"/>
  <text x="300" y="145" font-family="monospace" font-size="12" fill="#1E3A8A" text-anchor="middle">
    Rigor Specification
  </text>
  
  <!-- Arrow 2 -->
  <line x1="300" y1="160" x2="300" y2="180" stroke="#F2F2F2" stroke-width="1.5"/>
  <polygon points="300,180 295,175 305,175" fill="#F2F2F2"/>
  
  <!-- Box 3: AI Generation -->
  <rect x="200" y="180" width="200" height="40" fill="none" stroke="#F2F2F2" stroke-width="1.5"/>
  <text x="300" y="205" font-family="monospace" font-size="12" fill="#F2F2F2" text-anchor="middle">
    AI Generation
  </text>
  
  <!-- Arrow 3 -->
  <line x1="300" y1="220" x2="300" y2="240" stroke="#F2F2F2" stroke-width="1.5"/>
  <polygon points="300,240 295,235 305,235" fill="#F2F2F2"/>
  
  <!-- Box 4: Structural Validation -->
  <rect x="180" y="240" width="240" height="40" fill="none" stroke="#1E3A8A" stroke-width="2"/>
  <text x="300" y="265" font-family="monospace" font-size="12" fill="#1E3A8A" text-anchor="middle">
    Structural Validation
  </text>
  
  <!-- Arrow 4 -->
  <line x1="300" y1="280" x2="300" y2="300" stroke="#F2F2F2" stroke-width="1.5"/>
  <polygon points="300,300 295,295 305,295" fill="#F2F2F2"/>
  
  <!-- Box 5: Runtime Execution -->
  <rect x="200" y="300" width="200" height="40" fill="none" stroke="#F2F2F2" stroke-width="1.5"/>
  <text x="300" y="325" font-family="monospace" font-size="12" fill="#F2F2F2" text-anchor="middle">
    Runtime Execution
  </text>
  
  <!-- Legend -->
  <text x="50" y="370" font-family="monospace" font-size="10" fill="#A3A3A3">
    Constraint Layer
  </text>
  <rect x="140" y="362" width="20" height="12" fill="none" stroke="#1E3A8A" stroke-width="1.5"/>
</svg>
